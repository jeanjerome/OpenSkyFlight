<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OpenSkyFlight — 3D Flight Simulator</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a1a; font-family: 'Courier New', monospace; color: #ccc; }
    #canvas-container { width: 100%; height: 100%; }
    canvas { display: block; }
    #hud {
      position: fixed; top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none; z-index: 9;
    }

    /* Stats overlay */
    #stats {
      position: fixed; top: 12px; left: 12px;
      background: rgba(0,0,0,0.6); padding: 6px 12px;
      font-size: 13px; border-radius: 4px; pointer-events: none;
      z-index: 10;
    }

    /* Crosshair */
    #crosshair {
      position: fixed; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 20px; height: 20px;
      pointer-events: none; z-index: 10;
    }
    #crosshair::before, #crosshair::after {
      content: ''; position: absolute; background: rgba(255,255,255,0.5);
    }
    #crosshair::before { width: 2px; height: 100%; left: 50%; transform: translateX(-50%); }
    #crosshair::after { height: 2px; width: 100%; top: 50%; transform: translateY(-50%); }

    /* Help overlay */
    #help {
      position: fixed; bottom: 12px; left: 12px;
      background: rgba(0,0,0,0.6); padding: 8px 14px;
      font-size: 12px; border-radius: 4px; line-height: 1.6;
      pointer-events: none; z-index: 10;
    }

    /* Panel trigger zone */
    #panel-trigger {
      position: fixed; top: 0; right: 0;
      width: 20px; height: 100%;
      z-index: 19;
    }

    /* MFD Control Panel */
    #control-panel {
      position: fixed; top: 0; right: 0;
      background: rgba(0, 10, 5, 0.92);
      background-image: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0, 255, 136, 0.03) 2px,
        rgba(0, 255, 136, 0.03) 4px
      );
      width: 280px; height: 100%;
      font-size: 12px; z-index: 20;
      border-left: 2px solid #00ff88;
      border-radius: 0;
      box-shadow: -4px 0 20px rgba(0,255,136,0.15);
      transform: translateX(100%);
      transition: transform 0.25s ease;
      overflow-y: auto;
      display: flex; flex-direction: column;
    }
    #control-panel.visible { transform: translateX(0); }

    /* Scrollbar styling */
    #control-panel::-webkit-scrollbar { width: 4px; }
    #control-panel::-webkit-scrollbar-track { background: transparent; }
    #control-panel::-webkit-scrollbar-thumb { background: #005533; }

    /* MFD Header */
    .mfd-header {
      position: sticky; top: 0; z-index: 1;
      background: rgba(0, 10, 5, 0.95);
      border-bottom: 1px solid #005533;
      padding: 10px 14px;
      font-size: 11px;
      color: #00ff88;
      letter-spacing: 2px;
      text-align: center;
    }
    .mfd-header span { opacity: 0.5; }

    .mfd-body { padding: 10px 14px 14px; flex: 1; }

    /* Section labels */
    .mfd-section-label {
      display: flex; align-items: center; gap: 6px;
      font-size: 10px; color: #00cc66; letter-spacing: 2px;
      margin: 14px 0 10px; text-transform: uppercase;
    }
    .mfd-section-label::before,
    .mfd-section-label::after {
      content: ''; flex: 1; height: 1px; background: #003322;
    }

    /* Control groups */
    .ctrl-group { margin-bottom: 8px; }
    .ctrl-group label {
      display: flex; justify-content: space-between; margin-bottom: 2px;
      font-size: 11px; color: #00cc66; text-transform: uppercase; letter-spacing: 0.5px;
    }
    .ctrl-group label span { color: #00ff88; }
    .ctrl-group input[type=range] {
      width: 100%; cursor: pointer;
      accent-color: #00ff88;
      height: 4px;
    }
    .ctrl-group.checkbox-group {
      display: flex; align-items: center; gap: 8px;
    }
    .ctrl-group.checkbox-group input[type=checkbox] {
      accent-color: #00ff88; width: 14px; height: 14px; cursor: pointer;
    }
    .ctrl-group.checkbox-group label {
      margin-bottom: 0; font-size: 11px; cursor: pointer;
    }
    .ctrl-group input[type=text],
    .ctrl-group input[type=number] {
      width: 100%; background: rgba(0,255,136,0.05); border: 1px solid #005533;
      color: #00ff88; padding: 4px 8px; border-radius: 0; font-family: inherit; font-size: 11px;
    }
    .ctrl-group input[type=text]:focus,
    .ctrl-group input[type=number]:focus {
      outline: none; border-color: #00ff88;
      box-shadow: 0 0 6px rgba(0,255,136,0.2);
    }
    .ctrl-group select {
      width: 100%; background: rgba(0,255,136,0.05); border: 1px solid #005533;
      color: #00ff88; padding: 4px 8px; border-radius: 0; font-family: inherit; font-size: 11px;
    }
    .ctrl-group select:focus { outline: none; border-color: #00ff88; }
    .ctrl-group select option { background: #001a0d; color: #00ff88; }

    /* MFD Buttons */
    .mfd-btn {
      width: 100%; padding: 7px; margin-top: 8px;
      background: transparent; border: 1px solid #00ff88; color: #00ff88;
      border-radius: 0; cursor: pointer; font-family: inherit; font-size: 11px;
      text-transform: uppercase; letter-spacing: 1px;
      transition: background 0.15s, box-shadow 0.15s;
    }
    .mfd-btn:hover {
      background: rgba(0,255,136,0.12);
      box-shadow: 0 0 10px rgba(0,255,136,0.2);
    }
    .mfd-btn:active { background: rgba(0,255,136,0.25); }

    /* Search row */
    .search-row { display: flex; gap: 4px; }
    .search-row input { flex: 1; }
    #searchBtn {
      background: transparent; border: 1px solid #00ff88; color: #00ff88;
      padding: 4px 10px; border-radius: 0; cursor: pointer; font-size: 13px;
    }
    #searchBtn:hover { background: rgba(0,255,136,0.12); }

    /* Section separator */
    .section-separator { border: none; border-top: 1px solid #003322; margin: 12px 0; }

    /* Minimap panel */
    #minimap-container {
      position: fixed; bottom: 0; right: 0;
      width: 260px;
      background: rgba(0, 10, 5, 0.88);
      border: 1px solid #005533;
      border-right: none; border-bottom: none;
      z-index: 20; display: none;
      flex-direction: column;
      font-family: 'Courier New', monospace;
      font-size: 11px;
    }
    #minimap-header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 4px 8px;
      border-bottom: 1px solid #005533;
      color: #00cc66; letter-spacing: 1px; font-size: 10px;
    }
    .minimap-zoom-btns {
      display: flex; gap: 4px;
    }
    .minimap-zoom-btns button {
      background: transparent; border: 1px solid #005533; color: #00cc66;
      padding: 0 6px; cursor: pointer; font-family: inherit; font-size: 12px;
      line-height: 18px; letter-spacing: 0;
    }
    .minimap-zoom-btns button:hover { border-color: #00ff88; color: #00ff88; }
    #minimap {
      display: block;
      width: 256px; height: 256px;
      margin: 0 auto 2px;
    }

    /* Log panel */
    #log-panel-container {
      position: fixed; bottom: 0; left: 0;
      width: 520px; max-height: 220px;
      background: rgba(0, 10, 5, 0.88);
      border: 1px solid #005533;
      border-bottom: none; border-left: none;
      z-index: 15; display: none;
      flex-direction: column;
      font-family: 'Courier New', monospace;
      font-size: 11px;
    }
    #log-panel-header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 4px 8px;
      border-bottom: 1px solid #005533;
      color: #00cc66; letter-spacing: 1px; font-size: 10px;
    }
    #log-panel-clear {
      background: transparent; border: 1px solid #005533; color: #00cc66;
      padding: 1px 8px; cursor: pointer; font-family: inherit; font-size: 10px;
      letter-spacing: 1px;
    }
    #log-panel-clear:hover { border-color: #00ff88; color: #00ff88; }
    #log-panel {
      overflow-y: auto; flex: 1; padding: 4px 8px;
      max-height: 186px;
      line-height: 1.4;
    }
    #log-panel::-webkit-scrollbar { width: 4px; }
    #log-panel::-webkit-scrollbar-track { background: transparent; }
    #log-panel::-webkit-scrollbar-thumb { background: #005533; }
  </style>
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.183.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.183.0/examples/jsm/",
      "geo-three": "https://cdn.jsdelivr.net/npm/geo-three/build/geo-three.module.js"
    }
  }
  </script>
</head>
<body>
  <div id="canvas-container"></div>
  <canvas id="hud"></canvas>
  <div id="stats"></div>
  <div id="crosshair"></div>
  <div id="help">
    Click to capture mouse | Mouse: steer flight<br>
    ↑↓ : forward/backward | ←→ : strafe<br>
    X : debug tiles
  </div>

  <div id="minimap-container">
    <div id="minimap-header">
      <span>MAP</span>
      <div class="minimap-zoom-btns">
        <button id="minimap-zoom-out">&minus;</button>
        <button id="minimap-zoom-in">+</button>
      </div>
    </div>
    <canvas id="minimap" width="256" height="256"></canvas>
  </div>

  <div id="log-panel-container">
    <div id="log-panel-header">
      <span>LOG OUTPUT</span>
      <button id="log-panel-clear">CLEAR</button>
    </div>
    <div id="log-panel"></div>
  </div>

  <div id="panel-trigger"></div>
  <div id="control-panel">
    <div class="mfd-header">MFD-01 <span>/</span> TERRAIN SYS</div>
    <div class="mfd-body">

      <!-- ── SIMULATION ── -->
      <div class="mfd-section-label">SIMULATION</div>

      <div class="ctrl-group">
        <label>SPEED <span id="cameraSpeed-val"></span></label>
        <input type="range" id="cameraSpeed" />
      </div>

      <div class="ctrl-group" id="sim-viewdistance-group">
        <label>VIEW DISTANCE <span id="viewDistance-val"></span></label>
        <input type="range" id="viewDistance" />
      </div>

      <div class="ctrl-group checkbox-group" id="sim-wireframe-group">
        <input type="checkbox" id="wireframe" checked />
        <label for="wireframe">WIREFRAME</label>
      </div>

      <div class="ctrl-group checkbox-group">
        <input type="checkbox" id="showHud" checked />
        <label for="showHud">HUD OVERLAY</label>
      </div>

      <div class="ctrl-group checkbox-group">
        <input type="checkbox" id="showLogs" />
        <label for="showLogs">LOGS</label>
      </div>

      <div class="ctrl-group checkbox-group">
        <input type="checkbox" id="showMinimap" />
        <label for="showMinimap">MAP</label>
      </div>

      <div class="ctrl-group" id="logLevel-group">
        <label>LOG LEVEL</label>
        <select id="logLevel">
          <option value="DEBUG">DEBUG</option>
          <option value="INFO">INFO</option>
          <option value="WARN" selected>WARN</option>
          <option value="ERROR">ERROR</option>
        </select>
      </div>

      <!-- ── CONFIGURATION ── -->
      <div class="mfd-section-label">CONFIGURATION</div>

      <div class="ctrl-group">
        <label>MODE</label>
        <select id="terrainMode">
          <option value="procedural">Procedural</option>
          <option value="realworld">Real world</option>
        </select>
      </div>

      <div id="realworld-controls" style="display:none">
        <div class="ctrl-group">
          <label>SEARCH LOCATION</label>
          <div class="search-row">
            <input type="text" id="placeSearch" placeholder="Mont Blanc, Paris..." />
            <button id="searchBtn">&#128269;</button>
          </div>
        </div>
        <div class="ctrl-group">
          <label>LATITUDE</label>
          <input type="number" id="lat" step="0.001" />
        </div>
        <div class="ctrl-group">
          <label>LONGITUDE</label>
          <input type="number" id="lon" step="0.001" />
        </div>
        <div class="ctrl-group checkbox-group">
          <input type="checkbox" id="useOsmTexture" />
          <label for="useOsmTexture">TEXTURE / WIREFRAME</label>
        </div>
        <div class="ctrl-group">
          <label>SOURCE TEXTURE</label>
          <select id="textureSource">
            <option value="satellite">Satellite</option>
            <option value="osm">OpenStreetMap</option>
          </select>
        </div>
        <button id="loadTerrain" class="mfd-btn">LOAD TERRAIN</button>
        <hr class="section-separator" />
      </div>

      <div id="procedural-controls">
        <div class="ctrl-group">
          <label>RESOLUTION <span id="resolution-val"></span></label>
          <input type="range" id="resolution" />
        </div>
        <div class="ctrl-group">
          <label>MAX HEIGHT <span id="maxHeight-val"></span></label>
          <input type="range" id="maxHeight" />
        </div>
        <div class="ctrl-group">
          <label>OCTAVES <span id="octaves-val"></span></label>
          <input type="range" id="octaves" />
        </div>
        <div class="ctrl-group">
          <label>SEED</label>
          <input type="text" id="seed" />
        </div>
        <button id="regenerate" class="mfd-btn">REGENERATE TERRAIN</button>
      </div><!-- /procedural-controls -->

      <!-- ── ATMOSPHERE ── -->
      <div class="mfd-section-label">ATMOSPHERE</div>

      <div class="ctrl-group">
        <label>SUN ELEVATION <span id="sunElevation-val"></span></label>
        <input type="range" id="sunElevation" />
      </div>

      <div class="ctrl-group">
        <label>SUN AZIMUTH <span id="sunAzimuth-val"></span></label>
        <input type="range" id="sunAzimuth" />
      </div>

      <div class="ctrl-group">
        <label>TURBIDITY <span id="skyTurbidity-val"></span></label>
        <input type="range" id="skyTurbidity" />
      </div>

      <div class="ctrl-group checkbox-group">
        <input type="checkbox" id="showClouds" checked />
        <label for="showClouds">CLOUD LAYER</label>
      </div>

      <div class="ctrl-group">
        <label>CLOUD ALT <span id="cloudAltitude-val"></span></label>
        <input type="range" id="cloudAltitude" />
      </div>

      <div class="ctrl-group checkbox-group">
        <input type="checkbox" id="fogEnabled" checked />
        <label for="fogEnabled">ATMOSPHERIC FOG</label>
      </div>

    </div><!-- /mfd-body -->
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
